## Claude Code Memory Stack
## Qdrant vector DB + MCP server for persistent semantic memory
## across repos and sessions.
##
## Usage:
##   podman compose up -d
##   Then configure Claude Code (see README.md)

services:
  qdrant:
    image: docker.io/qdrant/qdrant:v1.17.1
    container_name: claude-memory-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"   # REST API
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qdrant-data:
